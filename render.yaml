
services:
  - type: web
    name: nxtlikebot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
    scaling:
      minInstances: 1
      maxInstances: 1
